# nginx.dev.conf — Configuración local (HTTP, sin SSL)
# Solo para pruebas locales que requieren nginx como proxy.
# Para uso simple local, docker-compose.yml expone el app directo en :3001.
#
# Para usar con nginx local:
#   Modificar docker-compose.yml → agregar servicio nginx con este config
#   y ALLOWED_ORIGIN=http://localhost en backend/.env

worker_processes auto;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    server_tokens off;
    client_max_body_size 22m;
    keepalive_timeout    65;

    upstream app {
        server vi_app:3001;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Uploads servidos directamente por nginx
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Health check — sin rate limit
        location /health {
            proxy_pass       http://app;
            proxy_set_header Host $host;
            access_log       off;
        }

        # API
        location /api/ {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
        }

        # SPA — todo lo demás va al frontend
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
        }
    }
}
